<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
    <defs>
        <!-- Dark Blue Gradient -->
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#020024;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#090979;stop-opacity:1" />
        </linearGradient>
        <!-- Digital Grid -->
        <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
            <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.15"/>
        </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#grad)" />
    <rect width="100%" height="100%" fill="url(#grid)" />
    <!-- Glowing light in the center -->
    <circle cx="50%" cy="50%" r="400" fill="#00d4ff" opacity="0.1" filter="blur(80px)"/>
</svg>
