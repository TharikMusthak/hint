<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
    <g opacity="0.85">
        <!-- Left Server Tower -->
        <rect x="150" y="350" width="180" height="750" fill="#0a1128" stroke="#00d4ff" stroke-width="2"/>
        <line x1="170" y1="400" x2="310" y2="400" stroke="#00d4ff" stroke-width="5" stroke-dasharray="10 5"/>
        <line x1="170" y1="450" x2="310" y2="450" stroke="#00ffcc" stroke-width="5"/>
        <circle cx="200" cy="520" r="8" fill="#00ffcc" opacity="0.8">
            <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" />
        </circle>

        <!-- Right Server Tower -->
        <rect x="1550" y="250" width="220" height="850" fill="#0a1128" stroke="#00d4ff" stroke-width="2"/>
        <line x1="1580" y1="320" x2="1740" y2="320" stroke="#00ffcc" stroke-width="6"/>
        <line x1="1580" y1="380" x2="1740" y2="380" stroke="#00d4ff" stroke-width="4" stroke-dasharray="20 10"/>
        
        <!-- Center Distant Tech Node -->
        <rect x="850" y="600" width="200" height="500" fill="#050814" stroke="#00d4ff" stroke-width="1"/>
        <path d="M850,600 L950,550 L1050,600" fill="none" stroke="#00ffcc" stroke-width="3"/>
    </g>
</svg>
