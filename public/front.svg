<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
    <!-- Office Desk -->
    <path d="M-100,1080 L-100,850 L2020,850 L2020,1080 Z" fill="#03050a"/>
    <path d="M-100,850 L-100,880 L2020,880 L2020,850 Z" fill="#00d4ff" opacity="0.2"/>
    
    <!-- Monitor Screen -->
    <rect x="1100" y="450" width="450" height="280" rx="10" fill="#0a1128" stroke="#1f2937" stroke-width="8"/>
    <rect x="1120" y="470" width="410" height="240" rx="5" fill="#00d4ff" opacity="0.15"/>
    <rect x="1300" y="730" width="50" height="120" fill="#1f2937"/>
    <path d="M1200,850 L1450,850 L1400,830 L1250,830 Z" fill="#374151"/>
    
    <!-- Code on Monitor -->
    <line x1="1140" y1="500" x2="1350" y2="500" stroke="#00ffcc" stroke-width="6" opacity="0.8"/>
    <line x1="1140" y1="530" x2="1250" y2="530" stroke="#00ffcc" stroke-width="6" opacity="0.8"/>
    <line x1="1140" y1="560" x2="1450" y2="560" stroke="#00d4ff" stroke-width="6" opacity="0.6"/>
    <line x1="1140" y1="590" x2="1300" y2="590" stroke="#00d4ff" stroke-width="6" opacity="0.6"/>

    <!-- Open Laptop on Desk -->
    <path d="M350,850 L450,700 L750,700 L850,850 Z" fill="#0a1128"/>
    <rect x="470" y="550" width="260" height="150" rx="8" fill="#111827" stroke="#1f2937" stroke-width="4"/>
    <rect x="480" y="560" width="240" height="130" fill="#00ffcc" opacity="0.1"/>
</svg>
